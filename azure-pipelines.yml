trigger:
  branches:
    include:
      - master
  tags:
    include:
      - v*

pr: none

pool:
  name: Default

variables:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: '1'
  DOTNET_CLI_TELEMETRY_OPTOUT: '1'
  DOTNET_NOLOGO: '1'

steps:
  - checkout: self
    clean: true
    fetchDepth: 0
    fetchTags: true
    persistCredentials: true

  - task: UseDotNet@2
    displayName: Use .NET SDK from global.json
    inputs:
      packageType: sdk
      useGlobalJson: true
      performMultiLevelLookup: true

  - pwsh: dotnet --info
    displayName: Show .NET SDK info

  - pwsh: dotnet tool restore
    displayName: Restore local .NET tools

  - pwsh: dotnet run --project build/MouseKeyProxy.Build.csproj -- --target ShowVersion --configuration Release
    displayName: Nuke ShowVersion

  - pwsh: dotnet run --project build/MouseKeyProxy.Build.csproj -- --target ValidateTraceability --configuration Release
    displayName: Nuke ValidateTraceability

  - pwsh: dotnet run --project build/MouseKeyProxy.Build.csproj -- --target Test --configuration Release
    displayName: Nuke Test

  - pwsh: dotnet run --project build/MouseKeyProxy.Build.csproj -- --target PackRepl --configuration Release
    displayName: Nuke PackRepl

  - task: PublishBuildArtifacts@1
    displayName: Publish tool package artifact
    inputs:
      PathtoPublish: output/packages
      ArtifactName: MouseKeyProxy.Repl
      publishLocation: Container

  - pwsh: dotnet run --project build/MouseKeyProxy.Build.csproj -- --target PublishToolToNuGet --configuration Release
    displayName: Nuke PublishToolToNuGet
    condition: and(succeeded(), startsWith(variables['Build.SourceBranch'], 'refs/tags/v'))
    env:
      NUGET_API_KEY: $(NUGET_API_KEY)